services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: railway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-railway}
      POSTGRES_DB: railway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railway"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://railway:${POSTGRES_PASSWORD:-railway}@postgres:5432/railway
      - REDIS_URL=redis://redis:6379/0
      - USE_TASK_QUEUE=true
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET=railway-audio
      - S3_USE_SSL=false
      - ASR_PROVIDER=faster-whisper
      - PARSER_MODE=hybrid
      - AUTH_REQUIRED=true
      - ENCRYPT_TRANSCRIPTS=true
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - YANDEX_SPEECH_API_KEY=${YANDEX_SPEECH_API_KEY:-}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin}
      - CORS_ORIGINS=["https://localhost","http://localhost"]
      - TRUST_PROXY_HEADERS=true
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://railway:${POSTGRES_PASSWORD:-railway}@postgres:5432/railway
      - REDIS_URL=redis://redis:6379/0
      - USE_TASK_QUEUE=true
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET=railway-audio
      - S3_USE_SSL=false
      - ASR_PROVIDER=faster-whisper
      - PARSER_MODE=hybrid
      - ENCRYPT_TRANSCRIPTS=true
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - api
      - redis
      - postgres
      - minio

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads:
